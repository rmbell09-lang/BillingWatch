services:
  - type: web
    name: billingwatch
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: '3.12.0'
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DB_PATH
        value: /tmp/billingwatch.db
      - key: SMTP_HOST
        value: ''
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USER
        value: ''
      - key: SMTP_PASS
        sync: false
      - key: SMTP_USE_TLS
        value: 'true'
      - key: ALERT_EMAIL_FROM
        value: ''
      - key: ALERT_EMAIL_TO
        value: ''
      - key: ALERT_WEBHOOK_URL
        value: ''
      - key: ALERT_WEBHOOK_SECRET
        sync: false
