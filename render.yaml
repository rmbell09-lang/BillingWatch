# render.yaml — BillingWatch deployment on Render (Docker mode)
# https://render.com/docs/render-yaml-spec
#
# ⚠️  SQLITE NOTE: Render's free tier has ephemeral disk storage.
#     Data will NOT persist across deploys/restarts.
#     For persistence: add a Render Disk (/mo) and set DB_PATH to its mount path.
#
# DEPLOY:
#   1. Push this file to repo root
#   2. New Render Blueprint → connect repo
#   3. Set secret env vars: STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET

services:
  - type: web
    name: billingwatch
    env: docker
    plan: free
    region: oregon

    dockerfilePath: ./Dockerfile

    healthCheckPath: /health

    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      - key: DB_PATH
        value: /tmp/billingwatch.db

      - key: SMTP_HOST
        value: 

      - key: SMTP_PORT
        value: 587

      - key: SMTP_USER
        value: 

      - key: SMTP_PASS
        sync: false

      - key: SMTP_USE_TLS
        value: true

      - key: ALERT_EMAIL_FROM
        value: 

      - key: ALERT_EMAIL_TO
        value: 

      - key: ALERT_WEBHOOK_URL
        value: 

      - key: ALERT_WEBHOOK_SECRET
        sync: false
